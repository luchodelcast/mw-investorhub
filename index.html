<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Master Waiters · Investor Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400..700;1,400..700&family=Outfit:wght@300..700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0806;--bg2:#1c1710;--gold:#c9a447;--gold-bright:#e8c96a;--gold-l:rgba(201,164,71,.08);--text:#ede9df;--text2:#a09880;--text3:#5c5648;--border:rgba(201,164,71,.22);--error:#d47e3f;--success:#7eb87a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{background:var(--bg);color:var(--text);font-family:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-25%;right:-15%;width:760px;height:760px;background:radial-gradient(circle,rgba(201,164,71,.09) 0%,transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-25%;left:-15%;width:600px;height:600px;background:radial-gradient(circle,rgba(212,126,63,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
.topbar{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:0.5px solid var(--border)}
.topbar-brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--text)}
.topbar-brand img{height:40px;width:auto;display:block}
.topbar-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3)}
.lang-toggle{display:inline-flex;align-items:center;font-size:11px;letter-spacing:.12em;padding:6px 11px;border-radius:100px;border:0.5px solid var(--border);cursor:pointer;user-select:none;transition:border-color .2s}
.lang-toggle:hover{border-color:rgba(201,164,71,.55)}
.lang-toggle span{padding:0 4px;color:rgba(180,170,150,.45);transition:color .2s}
.lang-toggle span.active{color:var(--gold);font-weight:600}
.lang-toggle .sep{margin:0 2px;opacity:.25;color:var(--gold)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;position:relative;z-index:1}
.login-card{max-width:480px;width:100%;text-align:center}
.login-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:22px}
.login-title{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,4.6vw,52px);font-weight:500;line-height:1.08;letter-spacing:-.01em;margin-bottom:18px}
.login-title em{color:var(--gold);font-style:italic}
.login-sub{font-size:15px;line-height:1.6;color:var(--text2);margin-bottom:36px;max-width:380px;margin-left:auto;margin-right:auto}
.login-form{display:flex;flex-direction:column;gap:14px;max-width:360px;margin:0 auto}
.login-input{width:100%;padding:15px 22px;background:var(--gold-l);border:0.5px solid var(--border);border-radius:100px;color:var(--text);font-family:inherit;font-size:13px;letter-spacing:.04em;outline:none;text-align:center;transition:border-color .2s,background .2s}
.login-input::placeholder{color:var(--text3);letter-spacing:.18em;text-transform:uppercase;font-size:11px}
.login-input:focus{border-color:var(--gold);background:rgba(201,164,71,.12)}
.login-btn{width:100%;padding:15px 22px;background:var(--gold);color:var(--bg);border:0.5px solid var(--gold);border-radius:100px;font-family:inherit;font-weight:500;font-size:12px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:background .2s,transform .1s}
.login-btn:hover{background:var(--gold-bright)}
.login-btn:active{transform:scale(.98)}
.login-msg{min-height:18px;margin-top:6px;font-size:12px;letter-spacing:.04em}
.login-msg.error{color:var(--error)}
.login-msg.success{color:var(--success)}
.xg-pill{display:inline-flex;align-items:center;gap:6px;margin-top:48px;padding:5px 12px;background:rgba(108,108,255,.08);border:0.5px solid rgba(108,108,255,.25);border-radius:100px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(237,233,224,.6);font-weight:500;text-decoration:none;transition:all .25s}
.xg-pill:hover{background:rgba(108,108,255,.15);border-color:rgba(108,108,255,.4);color:var(--text)}
.xg-pill-arrow{font-size:11px;opacity:.7;transition:transform .25s}
.xg-pill:hover .xg-pill-arrow{transform:translate(2px,-2px);opacity:1}
.footer{position:relative;z-index:2;padding:20px 28px;border-top:0.5px solid rgba(201,164,71,.1);text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3)}
@media (max-width:540px){.topbar{padding:14px 18px}.topbar-tag{display:none}main{padding:40px 18px}.login-title{font-size:32px}}
</style>
</head>
<body>
<div class="topbar">
<a href="index.html" class="topbar-brand">
<img src="logomw.png" alt="Master Waiters">
<span class="topbar-tag" data-i18n="login.tag">Investor Hub</span>
</a>
<div class="lang-toggle" id="langToggle">
<span data-lang="es" class="active">ES</span>
<span class="sep">|</span>
<span data-lang="en">EN</span>
</div>
</div>
<main>
<div class="login-card">
<div class="login-eyebrow" data-i18n="login.eyebrow">Pre-Seed Round 2026 · Confidencial</div>
<h1 class="login-title" data-i18n="login.title">Acceso <em>privado</em></h1>
<p class="login-sub" data-i18n="login.sub">Este Hub está reservado para inversionistas y aliados estratégicos invitados por Master Waiters.</p>
<form class="login-form" onsubmit="return mwLogin(event)">
<input id="pw" type="password" class="login-input" autocomplete="off" autofocus data-i18n-placeholder="login.placeholder" placeholder="Tu código de acceso">
<button type="submit" class="login-btn" data-i18n="login.btn">Entrar</button>
<div id="msg" class="login-msg"></div>
</form>
<a href="https://investorhub.xgaige.com/" class="xg-pill" target="_blank" rel="noopener">
<span data-i18n="login.xg_pill">Vertical 01 de XGAIGE</span>
<span class="xg-pill-arrow">↗</span>
</a>
</div>
</main>
<div class="footer" data-i18n="login.footer">Master Waiters · Superlikers · 2026 · Confidencial</div>
<script src="investors.js"></script>
<script>
const I18N={es:{'login.tag':'Investor Hub','login.eyebrow':'Pre-Seed Round 2026 · Confidencial','login.title':'Acceso <em>privado</em>','login.sub':'Este Hub está reservado para inversionistas y aliados estratégicos invitados por Master Waiters.','login.placeholder':'Tu código de acceso','login.btn':'Entrar','login.xg_pill':'Vertical 01 de XGAIGE','login.footer':'Master Waiters · Superlikers · 2026 · Confidencial','login.err_invalid':'El código no es válido. Verifica con tu contacto en Master Waiters.','login.success':'Bienvenido. Cargando…'},en:{'login.tag':'Investor Hub','login.eyebrow':'Pre-Seed Round 2026 · Confidential','login.title':'<em>Private</em> access','login.sub':'This Hub is reserved for investors and strategic allies invited by Master Waiters.','login.placeholder':'Your access code','login.btn':'Enter','login.xg_pill':'Vertical 01 of XGAIGE','login.footer':'Master Waiters · Superlikers · 2026 · Confidential','login.err_invalid':'Code not valid. Please verify with your contact at Master Waiters.','login.success':'Welcome. Loading…'}};
function setLang(lang){document.documentElement.lang=lang;try{localStorage.setItem('mw_lang',lang)}catch(e){}document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(I18N[lang]&&I18N[lang][k])el.innerHTML=I18N[lang][k]});document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const k=el.dataset.i18nPlaceholder;if(I18N[lang]&&I18N[lang][k])el.placeholder=I18N[lang][k]});document.querySelectorAll('#langToggle [data-lang]').forEach(s=>{s.classList.toggle('active',s.dataset.lang===lang)})}
document.getElementById('langToggle').addEventListener('click',e=>{const t=e.target.closest('[data-lang]');if(!t)return;setLang(t.dataset.lang)});
const savedLang=(()=>{try{return localStorage.getItem('mw_lang')}catch(e){return null}})();setLang(savedLang==='en'?'en':'es');
function mwLogin(e){e.preventDefault();const pw=document.getElementById('pw').value;const msg=document.getElementById('msg');const lang=document.documentElement.lang;const t=k=>(I18N[lang]&&I18N[lang][k])||I18N.es[k];const inv=mwValidateCredential(pw);if(!inv){msg.className='login-msg error';msg.textContent=t('login.err_invalid');return false}mwCreateSession(inv);msg.className='login-msg success';msg.textContent=t('login.success');const dest=inv.personal?inv.personal:'hub.html';setTimeout(()=>{window.location.href=dest},600);return false}
(function skipIfLoggedIn(){if(typeof mwGetSession!=='function')return;const s=mwGetSession();if(!s)return;const dest=s.personal?s.personal:'hub.html';window.location.replace(dest)})();
</script>
</body>
</html>
